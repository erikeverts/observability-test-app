apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-product
  labels:
    app: product
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.product.replicas }}
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      serviceAccountName: {{ .Release.Name }}-product
      containers:
        - name: product
          image: {{ .Values.image.registry }}/product:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "app.securityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.product.port }}
          env:
            - name: OTEL_SERVICE_NAME
              value: product
            - name: SERVICE_PORT
              value: {{ .Values.product.port | quote }}
            {{- include "app.otelEnv" . | nindent 12 }}
            {{- include "app.chaosEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.product.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.product.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.product.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-product
  labels:
    app: product
    {{- include "app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.product.port }}
      targetPort: {{ .Values.product.port }}
      protocol: TCP
  selector:
    app: product
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-product
  labels:
    app: product
    {{- include "app.labels" . | nindent 4 }}
