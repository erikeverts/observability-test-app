{{- if .Values.grafanaDashboard.enabled }}
apiVersion: {{ .Values.grafanaDashboard.apiVersion }}
kind: {{ .Values.grafanaDashboard.kind | default "Dashboard" }}
metadata:
  name: {{ .Release.Name }}-observability-dashboard
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  forProvider:
    {{- if .Values.grafanaDashboard.folder }}
    folder: {{ .Values.grafanaDashboard.folder | quote }}
    {{- end }}
    configJson: |
      {
        "title": "Observability Test App",
        "uid": "{{ .Release.Name }}-obs-test-app",
        "tags": ["observability", "otel", "chaos"],
        "timezone": "browser",
        "editable": true,
        "refresh": "10s",
        "time": {
          "from": "now-30m",
          "to": "now"
        },
        "templating": {
          "list": [
            {
              "name": "service",
              "type": "custom",
              "current": { "text": "All", "value": "$__all" },
              "options": [
                { "text": "All", "value": "$__all", "selected": true },
                { "text": "gateway", "value": "gateway", "selected": false },
                { "text": "product", "value": "product", "selected": false },
                { "text": "order", "value": "order", "selected": false },
                { "text": "inventory", "value": "inventory", "selected": false }
              ],
              "query": "gateway,product,order,inventory",
              "includeAll": true,
              "multi": true
            }
          ]
        },
        "panels": [
          {
            "title": "Request Rate",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "custom": { "fillOpacity": 15, "lineWidth": 2 }
              }
            },
            "targets": [
              {
                "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{job}}" }}"
              }
            ]
          },
          {
            "title": "Request Duration (p50 / p95 / p99)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "s",
                "custom": { "fillOpacity": 10, "lineWidth": 2 }
              }
            },
            "targets": [
              {
                "expr": "histogram_quantile(0.50, sum by (le, job) (rate(http_server_request_duration_seconds_bucket{job=~\"$service\"}[$__rate_interval])))",
                "legendFormat": "{{ "{{job}}" }} p50"
              },
              {
                "expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_server_request_duration_seconds_bucket{job=~\"$service\"}[$__rate_interval])))",
                "legendFormat": "{{ "{{job}}" }} p95"
              },
              {
                "expr": "histogram_quantile(0.99, sum by (le, job) (rate(http_server_request_duration_seconds_bucket{job=~\"$service\"}[$__rate_interval])))",
                "legendFormat": "{{ "{{job}}" }} p99"
              }
            ]
          },
          {
            "title": "Error Rate (5xx)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "custom": { "fillOpacity": 15, "lineWidth": 2 },
                "min": 0,
                "max": 1,
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.01 },
                    { "color": "red", "value": 0.05 }
                  ]
                },
                "color": { "mode": "palette-classic" }
              }
            },
            "targets": [
              {
                "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$service\", http_response_status_code=~\"5..\"}[$__rate_interval])) / sum by (job) (rate(http_server_request_duration_seconds_count{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{job}}" }}"
              }
            ]
          },
          {
            "title": "Orders Created",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 0, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "color": "blue", "value": null }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "sum(increase(app_orders_created_total[$__range]))",
                "legendFormat": "orders"
              }
            ],
            "options": { "colorMode": "background", "graphMode": "area" }
          },
          {
            "title": "Product Views",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 4, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "sum(increase(app_products_views_total[$__range]))",
                "legendFormat": "views"
              }
            ],
            "options": { "colorMode": "background", "graphMode": "area" }
          },
          {
            "title": "Chaos Errors Injected",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 8, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "orange", "value": 1 },
                    { "color": "red", "value": 10 }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "sum(increase(app_chaos_errors_injected_total[$__range]))",
                "legendFormat": "injected"
              }
            ],
            "options": { "colorMode": "background", "graphMode": "area" }
          },
          {
            "title": "Inventory Disk Usage",
            "type": "gauge",
            "gridPos": { "h": 4, "w": 4, "x": 12, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "percentunit",
                "min": 0,
                "max": 1,
                "thresholds": {
                  "mode": "absolute",
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "yellow", "value": 0.7 },
                    { "color": "red", "value": 0.9 }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "kubelet_volume_stats_used_bytes{namespace=\"{{ .Release.Namespace }}\", persistentvolumeclaim=~\"data-.*-inventory-.*\"} / kubelet_volume_stats_capacity_bytes{namespace=\"{{ .Release.Namespace }}\", persistentvolumeclaim=~\"data-.*-inventory-.*\"}",
                "legendFormat": "used"
              }
            ],
            "options": {
              "reduceOptions": { "calcs": ["lastNotNull"] },
              "showThresholdLabels": false,
              "showThresholdMarkers": true
            }
          },
          {
            "title": "Chaos Latency Injected",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 16, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "orange", "value": 1 },
                    { "color": "red", "value": 10 }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "sum(increase(app_chaos_latency_injected_total[$__range]))",
                "legendFormat": "injected"
              }
            ],
            "options": { "colorMode": "background", "graphMode": "area" }
          },
          {
            "title": "Chaos Injection Rate",
            "type": "timeseries",
            "gridPos": { "h": 4, "w": 4, "x": 20, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "ops",
                "custom": { "fillOpacity": 15, "lineWidth": 2 }
              }
            },
            "targets": [
              {
                "expr": "sum by (job) (rate(app_chaos_errors_injected_total{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{job}}" }} errors"
              },
              {
                "expr": "sum by (job) (rate(app_chaos_latency_injected_total{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{job}}" }} latency"
              }
            ]
          },
          {
            "title": "Request Rate by Method & Status",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "custom": { "fillOpacity": 10, "lineWidth": 2 }
              }
            },
            "targets": [
              {
                "expr": "sum by (job, http_request_method, http_response_status_code) (rate(http_server_request_duration_seconds_count{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{job}}" }} {{ "{{http_request_method}}" }} {{ "{{http_response_status_code}}" }}"
              }
            ]
          },
          {
            "title": "Response Status Codes",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "reqps",
                "custom": { "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "normal" } }
              },
              "overrides": [
                {
                  "matcher": { "id": "byRegexp", "options": ".*2.." },
                  "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }]
                },
                {
                  "matcher": { "id": "byRegexp", "options": ".*4.." },
                  "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }]
                },
                {
                  "matcher": { "id": "byRegexp", "options": ".*5.." },
                  "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }]
                }
              ]
            },
            "targets": [
              {
                "expr": "sum by (http_response_status_code) (rate(http_server_request_duration_seconds_count{job=~\"$service\"}[$__rate_interval]))",
                "legendFormat": "{{ "{{http_response_status_code}}" }}"
              }
            ]
          },
          {
            "title": "Request/Response Body Size (p95)",
            "type": "timeseries",
            "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "unit": "bytes",
                "custom": { "fillOpacity": 10, "lineWidth": 2 }
              }
            },
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_server_request_body_size_bytes_bucket{job=~\"$service\"}[$__rate_interval])))",
                "legendFormat": "{{ "{{job}}" }} request p95"
              },
              {
                "expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_server_response_body_size_bytes_bucket{job=~\"$service\"}[$__rate_interval])))",
                "legendFormat": "{{ "{{job}}" }} response p95"
              }
            ]
          },
          {
            "title": "Traces",
            "type": "table",
            "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
            "datasource": { "type": "tempo", "uid": "{{ .Values.grafanaDashboard.datasources.tempo }}" },
            "targets": [
              {
                "queryType": "traceql",
                "query": "{resource.service.name =~ \"gateway|product|order|inventory\"}",
                "limit": 20,
                "tableType": "traces"
              }
            ]
          },
          {
            "title": "Logs",
            "type": "logs",
            "gridPos": { "h": 10, "w": 24, "x": 0, "y": 28 },
            "datasource": { "type": "loki", "uid": "{{ .Values.grafanaDashboard.datasources.loki }}" },
            "targets": [
              {
                "expr": "{service_name=~\"$service\"} | json",
                "legendFormat": ""
              }
            ],
            "options": {
              "showTime": true,
              "showLabels": true,
              "showCommonLabels": false,
              "wrapLogMessage": true,
              "prettifyLogMessage": false,
              "enableLogDetails": true,
              "sortOrder": "Descending",
              "dedupStrategy": "none"
            }
          }
          {{- if .Values.database.cnpg.enabled }}
          ,{
            "title": "PostgreSQL Instances",
            "type": "stat",
            "gridPos": { "h": 4, "w": 4, "x": 20, "y": 8 },
            "datasource": { "type": "prometheus", "uid": "{{ .Values.grafanaDashboard.datasources.prometheus }}" },
            "fieldConfig": {
              "defaults": {
                "thresholds": {
                  "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 0 }
                  ]
                }
              }
            },
            "targets": [
              {
                "expr": "cnpg_collector_up{namespace=\"{{ .Release.Namespace }}\", cluster=~\".*-db\"}",
                "legendFormat": "{{ "{{cluster}}" }}"
              }
            ],
            "options": { "colorMode": "background", "graphMode": "none" }
          }
          {{- end }}
        ],
        "schemaVersion": 39,
        "version": 2
      }
  providerConfigRef:
    name: {{ .Values.grafanaDashboard.providerConfigRef }}
{{- end }}
