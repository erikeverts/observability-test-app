apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-order
  labels:
    app: order
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.order.replicas }}
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      serviceAccountName: {{ .Release.Name }}-order
      containers:
        - name: order
          image: {{ .Values.image.registry }}/order:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- include "app.securityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.order.port }}
          env:
            - name: OTEL_SERVICE_NAME
              value: order
            - name: SERVICE_PORT
              value: {{ .Values.order.port | quote }}
            - name: PRODUCT_SERVICE_URL
              value: "http://{{ .Release.Name }}-product:{{ .Values.product.port }}"
            {{- include "app.otelEnv" . | nindent 12 }}
            {{- include "app.chaosEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.order.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.order.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.order.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-order
  labels:
    app: order
    {{- include "app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.order.port }}
      targetPort: {{ .Values.order.port }}
      protocol: TCP
  selector:
    app: order
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-order
  labels:
    app: order
    {{- include "app.labels" . | nindent 4 }}
