image:
  registry: ghcr.io/erikeverts/observability-test-app
  tag: latest
  pullPolicy: IfNotPresent

otel:
  endpoint: "otel-collector:4317"
  protocol: "grpc"
  insecure: true
  metricsTemporality: "delta"
  basicAuth:
    user: ""
    password: ""
  headers: ""
  tls:
    secretName: ""
    customCACert: true

grafana:
  endpoint: ""
  apiToken: ""

chaos:
  errorRoutes: ""
  latencyRoutes: ""
  cpuLoad:
    enabled: false
    percent: 0
  memLoad:
    enabled: false
    mb: 0
  logVolume:
    enabled: false
    ratePerSec: 0
    pattern: "mixed"
  diskFill:
    enabled: false
    rateMB: 1

gateway:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

product:
  replicas: 1
  port: 8081
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

order:
  replicas: 1
  port: 8082
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

inventory:
  port: 8084
  storage: 256Mi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dashboard:
  port: 8083
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
